services:
  notebook:
    build: .
    ports:
      - "8888:8888"   # Jupyter
    volumes:
      - .:/app        # mounts your local project folder into the container
                      # → changes you make locally are instantly reflected inside
    environment:
      - PYTHONUNBUFFERED=1

  mlflow:
    build: .
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /app/notebooks/mlruns
    ports:
      - "5001:5000"   # MLflow UI → http://localhost:5001
    volumes:
      - .:/app        # same volume so mlruns is shared with notebook
    environment:
      - PYTHONUNBUFFERED=1

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"   # FastAPI → http://localhost:8000/docs
    volumes:
      - .:/app        # same volume so models/ is shared
    environment:
      - PYTHONUNBUFFERED=1

  streamlit:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"   # Streamlit UI → http://localhost:8501
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://api:8000
    depends_on:
      - api
