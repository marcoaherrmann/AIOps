services:
  notebook:
    build: .
    ports:
      - "8888:8888"   # Jupyter
    volumes:
      - .:/app        # mounts your local project folder into the container
                      # → changes you make locally are instantly reflected inside
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_ALLOW_FILE_STORE=true   # required since newer MLflow versions

  mlflow:
    build: .
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////app/data/mlflow.db
    ports:
      - "5001:5000"   # MLflow UI → http://localhost:5001
    volumes:
      - .:/app        # same volume so mlruns is shared with notebook
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_ALLOW_FILE_STORE=true   # newer MLflow versions require this for file-based tracking

  api:
    build: .
    command: sh -c "python src/train.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"   # FastAPI → http://localhost:8000/docs
    volumes:
      - .:/app        # same volume so models/ is shared
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_ALLOW_FILE_STORE=true
      - MLFLOW_TRACKING_URI=sqlite:////app/data/mlflow.db
      - TZ=Europe/Berlin

  dash:
    build: .
    command: python dash_app.py
    ports:
      - "8050:8050"   # Plotly Dash Analytics → http://localhost:8050
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://api:8000
    depends_on:
      - api

  streamlit:
    build: .
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"   # Streamlit UI → http://localhost:8501
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - API_URL=http://api:8000
    depends_on:
      - api

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"   # Metabase BI → http://localhost:3000
    volumes:
      - .:/app-data   # delaypredict.db accessible at /app-data/data/delaypredict.db
    environment:
      - MB_DB_FILE=/app-data/data/metabase.db
